<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitten TTS Nano Demo</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Kitten TTS Nano Demo" />
    <meta property="og:description" content="Lightweight text-to-speech model running 100% locally in your browser. Powered by Transformers.js and ONNX Runtime." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kittentts.tanxy.club/" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kitten TTS Web Demo" />
    <meta name="twitter:description" content="A Web Demo Based on KittenTTS" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Kitten TTS Web Demo" />
    <meta name="keywords" content="text-to-speech, TTS, AI, machine learning, browser, local, ONNX, WebAssembly" />
    <meta name="author" content="SeanTan" />
    
    <!-- Error debugging for Vercel deployment -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        document.body.innerHTML = '<div style="padding: 20px; font-family: monospace;">Error: ' + e.message + '<br>File: ' + e.filename + '<br>Line: ' + e.lineno + '</div>';
      });
      
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled rejection:', e.reason);
        document.body.innerHTML = '<div style="padding: 20px; font-family: monospace;">Promise rejection: ' + e.reason + '</div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
